name: LLM App CI/CD

# WHEN TO RUN
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

# THREE SEPARATE JOBS
jobs:
  # JOB 1: TEST

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: BUILD

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build step
        run: echo "Building app... packaging complete!"
        
  # JOB 3: DEPLOY

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy step
        run: echo "Deploying to staging server... deployment complete!"
