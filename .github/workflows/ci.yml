name: LLM App CI/CD

# WHEN TO RUN
# Triggers on push to main or dev branch, and on pull requests
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

# THREE SEPARATE JOBS
jobs:

  #JOB1: Test
  test:
    runs-on: ubuntu-latest

    steps:
      # Download code onto fresh machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install all packages from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests using pytest
      # Tests use mocking — no API key needed
      - name: Run tests
        run: pytest tests/ -v


  # JOB 2: BUILD
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build step
        run: echo "Building app... packaging complete!"


  # JOB 3: DEPLOY
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy step
        run: echo "Deploying to staging server... deployment complete!"
